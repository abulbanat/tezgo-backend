<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>TezGo — Chat</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{--brand:#FFC400;--ink:#151A24;--muted:#8A93A8;--line:#E9ECF1;--accent:#22D3EE;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif;color:var(--ink);background:#EEF1F5;display:flex;flex-direction:column;height:100vh}
  header{background:#fff;padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  header .t{font-weight:800}header .t b{color:#111}
  header .who{font-size:.74rem;color:var(--muted);margin-left:auto;text-align:right}
  header .who b{color:var(--accent)}
  #msgs{flex:1;overflow:auto;padding:14px}
  .m{margin-bottom:10px;max-width:80%;clear:both}
  .m.me{float:right;text-align:right}.m.them{float:left}
  .m .b{display:inline-block;padding:9px 13px;border-radius:14px;font-size:.92rem;line-height:1.3;word-break:break-word}
  .m.them .b{background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
  .m.me .b{background:var(--brand);border-bottom-right-radius:4px}
  .m .tm{font-size:.62rem;color:var(--muted);margin-top:2px}
  .m img{max-width:210px;border-radius:12px;display:block}
  .sys{clear:both;text-align:center;color:var(--muted);font-size:.78rem;margin:8px 0}
  footer{background:#fff;border-top:1px solid var(--line);padding:8px;display:flex;gap:8px;align-items:center}
  #txt{flex:1;border:1.5px solid var(--line);border-radius:20px;padding:11px 14px;font-size:.95rem;outline:none}
  .icon{width:44px;height:44px;border-radius:50%;border:0;font-size:1.2rem;cursor:pointer;flex:0 0 auto}
  .send{background:var(--brand)} .att{background:#EEF1F5}
</style>
</head>
<body>
<header>
  <div class="t">Tez<b>Go</b> chat</div>
  <div class="who" id="who"></div>
</header>
<div id="msgs"><div class="sys" id="status">Ulanmoqda…</div></div>
<footer>
  <button class="icon att" onclick="document.getElementById('file').click()" title="Rasm">📷</button>
  <input type="file" id="file" accept="image/*" style="display:none">
  <input id="txt" placeholder="Xabar yozing…" autocomplete="off">
  <button class="icon send" onclick="sendText()">➤</button>
</footer>

<script>
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if(tg){ try{ tg.ready(); tg.expand(); }catch(e){} }

const qs = new URLSearchParams(location.search);
const code = qs.get('order') || qs.get('code') || '';
const role = qs.get('role') || 'customer';
const t = qs.get('t') || '';
document.getElementById('who').innerHTML = (role==='driver'?'Haydovchi':'Mijoz')+" · <b>#"+code+"</b>";

const msgsEl = document.getElementById('msgs');
function h(s){return (s??"").toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function time(s){const d=new Date(s);return d.toLocaleTimeString('uz-UZ',{hour:'2-digit',minute:'2-digit'});}
function setStatus(x){const s=document.getElementById('status'); if(s) s.textContent=x;}

function addMsg(m){
  const mine = m.role===role;
  const div=document.createElement('div');
  div.className='m '+(mine?'me':'them');
  const inner = m.type==='image' ? `<img src="${h(m.image_url)}">` : h(m.body);
  div.innerHTML=`<div class="b">${inner}</div><div class="tm">${time(m.created_at)}</div>`;
  msgsEl.appendChild(div);
  msgsEl.scrollTop=msgsEl.scrollHeight;
}

async function loadHistory(){
  try{
    const r=await fetch(`/api/chat/${encodeURIComponent(code)}?role=${role}&t=${t}`);
    if(!r.ok){ setStatus("Chatga ruxsat yo'q"); return false; }
    const d=await r.json();
    const st=document.getElementById('status'); if(st) st.remove();
    d.messages.forEach(addMsg);
    return true;
  }catch(e){ setStatus("Ulanish xatosi"); return false; }
}

let ws;
function connect(){
  const proto = location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}/ws/chat/${encodeURIComponent(code)}?role=${role}&t=${t}`);
  ws.onmessage=e=>{ try{ addMsg(JSON.parse(e.data)); }catch(_){} };
  ws.onclose=()=>setTimeout(connect, 2500);
}

async function sendText(){
  const el=document.getElementById('txt'); const body=el.value.trim(); if(!body) return;
  el.value="";
  if(ws && ws.readyState===1){ ws.send(JSON.stringify({body})); }
  else{ await fetch(`/api/chat/${encodeURIComponent(code)}/message`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({role,t,body})}); }
}
document.getElementById('txt').addEventListener('keydown',e=>{if(e.key==='Enter')sendText();});

document.getElementById('file').addEventListener('change', async e=>{
  const f=e.target.files[0]; if(!f) return;
  const fd=new FormData(); fd.append('role',role); fd.append('t',t); fd.append('file',f);
  await fetch(`/api/chat/${encodeURIComponent(code)}/image`,{method:"POST",body:fd});
  e.target.value="";
});

(async()=>{ if(await loadHistory()) connect(); })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TezGo — Admin</title>
<style>
  :root{--brand:#FFC400;--ink:#151A24;--muted:#8A93A8;--line:#E9ECF1;--bg:#F5F7FA;--accent:#22D3EE;--green:#2BB673;--red:#F0553B;--blue:#0b6ea8;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg)}
  /* login */
  #login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--ink)}
  #login .card{background:#fff;border-radius:18px;padding:28px;width:320px;box-shadow:0 20px 60px -20px rgba(0,0,0,.6)}
  #login h1{font-size:1.3rem;margin-bottom:4px}#login .sub{color:var(--muted);font-size:.85rem;margin-bottom:18px}
  #login input{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:12px;margin-bottom:10px;font-size:.95rem}
  #login button{width:100%;background:var(--brand);border:0;border-radius:11px;padding:13px;font-weight:800;font-size:1rem;cursor:pointer}
  #login .err{color:var(--red);font-size:.82rem;margin-top:8px;min-height:18px}
  .bm{display:inline-flex;align-items:baseline;gap:8px;margin-bottom:14px}
  .bm .lg{font-size:1.4rem;font-weight:800}.bm .lg b{color:#111}.bm .tag{font-size:.6rem;color:var(--muted)}
  /* app */
  #app{display:none;grid-template-columns:220px 1fr;min-height:100vh}
  .side{background:var(--ink);color:#cfd6e4;padding:18px 12px;position:sticky;top:0;height:100vh}
  .side .logo{color:#fff;font-weight:800;font-size:1.15rem;padding:6px 10px 2px}.side .logo b{color:var(--brand)}
  .side .made{font-size:.56rem;color:#6b7590;padding:0 10px 16px}
  .nav a{display:block;padding:10px 12px;border-radius:10px;font-size:.92rem;color:#cfd6e4;cursor:pointer;text-decoration:none;margin-bottom:2px}
  .nav a:hover{background:#20283a}.nav a.on{background:var(--brand);color:#151A24;font-weight:700}
  .side .out{position:absolute;bottom:16px;left:12px;right:12px;font-size:.82rem;color:#8a97ac;cursor:pointer;padding:8px 12px}
  main{padding:22px 26px;overflow-x:auto}
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .head h2{font-size:1.35rem}
  .tools{display:flex;gap:8px;align-items:center}
  .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:18px}
  .stat{background:#fff;border-radius:14px;padding:16px;border:1px solid var(--line)}
  .stat .n{font-size:1.7rem;font-weight:800}.stat .l{color:var(--muted);font-size:.78rem;margin-top:2px}
  .stat.g .n{color:var(--green)}.stat.b .n{color:var(--blue)}.stat.r .n{color:var(--red)}.stat.y .n{color:#a6820a}
  h3.sec{font-size:.95rem;margin:6px 0 10px;color:var(--muted)}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
  .chip{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:6px 13px;font-size:.8rem;cursor:pointer;font-weight:600;color:var(--muted)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden;border:1px solid var(--line)}
  th,td{text-align:left;padding:10px 12px;font-size:.85rem;border-bottom:1px solid var(--line);vertical-align:middle}
  th{background:#fafbfc;color:var(--muted);font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em}
  tr:last-child td{border-bottom:0}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:.7rem;font-weight:700;white-space:nowrap}
  .pill.pending{background:#FFF3D6;color:#8a6d00}.pill.accepted,.pill.enroute,.pill.arrived{background:#E1F4FF;color:#0b6ea8}
  .pill.completed,.pill.approved{background:#E2F7EC;color:#1a7a4d}.pill.cancelled,.pill.rejected,.pill.blocked{background:#FDE4DF;color:#a83322}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}.dot.on{background:var(--green)}.dot.off{background:#c4ccd6}
  .btn{border:0;border-radius:8px;padding:6px 11px;font-weight:700;font-size:.78rem;cursor:pointer;white-space:nowrap}
  .btn.g{background:var(--green);color:#fff}.btn.r{background:var(--red);color:#fff}.btn.k{background:#eef1f5}.btn.d{background:var(--ink);color:#fff}
  .actions{display:flex;gap:6px;flex-wrap:wrap}
  .muted{color:var(--muted)}.link{color:var(--blue);cursor:pointer;text-decoration:underline}
  .empty{padding:34px;text-align:center;color:var(--muted)}
  .route{max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  /* modal */
  .modal{position:fixed;inset:0;background:rgba(10,14,22,.55);display:none;align-items:center;justify-content:center;z-index:50}
  .modal .box{background:#fff;border-radius:16px;width:min(560px,94vw);max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
  .modal .top{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal .body{padding:14px;overflow:auto;background:#f5f7fa}
  .x{cursor:pointer;color:var(--muted);font-size:1.2rem}
  .m{margin-bottom:10px;max-width:80%}.m.customer{margin-right:auto}.m.driver{margin-left:auto;text-align:right}
  .m .b{display:inline-block;padding:8px 12px;border-radius:12px;font-size:.88rem;background:#fff;border:1px solid var(--line)}
  .m.driver .b{background:#FFF7DA}.m .who{font-size:.64rem;color:var(--muted);margin-bottom:2px}.m img{max-width:200px;border-radius:10px}
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <div class="bm"><span class="lg">Tez<b>Go</b></span><span class="tag">Admin</span></div>
    <h1>Kirish</h1><div class="sub">Boshqaruv paneli</div>
    <input id="u" placeholder="Login" autocomplete="username">
    <input id="p" type="password" placeholder="Parol" autocomplete="current-password">
    <button onclick="doLogin()">Kirish</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<div id="app">
  <aside class="side">
    <div class="logo">Tez<b>Go</b></div><div class="made">Made by CoreStack Labs</div>
    <nav class="nav" id="nav">
      <a data-v="dashboard" class="on">📊 Boshqaruv</a>
      <a data-v="orders">🚕 Buyurtmalar</a>
      <a data-v="applications">📝 Arizalar</a>
      <a data-v="drivers">🧑‍✈️ Haydovchilar</a>
      <a data-v="customers">👥 Mijozlar</a>
    </nav>
    <div class="out" onclick="logout()">↩ Chiqish</div>
  </aside>
  <main>
    <div class="head"><h2 id="title">Boshqaruv</h2>
      <div class="tools">
        <label class="muted" style="font-size:.8rem"><input type="checkbox" id="auto"> Avto-yangilash</label>
        <button class="btn k" onclick="render()">↻ Yangilash</button>
      </div>
    </div>
    <div id="content"></div>
  </main>
</div>

<div class="modal" id="chatModal"><div class="box">
  <div class="top"><b>Buyurtma chati — <span id="chatCode"></span></b><span class="x" onclick="closeM('chatModal')">✕</span></div>
  <div class="body" id="chatBody"></div>
</div></div>

<div class="modal" id="docsModal"><div class="box">
  <div class="top"><b>Hujjatlar — <span id="docsTitle"></span></b><span class="x" onclick="closeM('docsModal')">✕</span></div>
  <div class="body" id="docsBody"></div>
</div></div>

<script>
const API="";
let token="", view="dashboard", timer=null;
let orderFilter="", driverFilter="", _cache={};

function h(s){return (s??"").toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function dt(s){if(!s)return "—";const d=new Date(s);return d.toLocaleString('uz-UZ',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}
function som(n){return n?Number(n).toLocaleString('ru-RU'):'—';}
function pill(s){return `<span class="pill ${h(s)}">${h(s)}</span>`;}
function openM(id){document.getElementById(id).style.display="flex";}
function closeM(id){document.getElementById(id).style.display="none";}

async function api(path,opts={}){
  const r=await fetch(API+path,{...opts,headers:{...(opts.headers||{}),"Authorization":"Bearer "+token,"Content-Type":"application/json"}});
  if(r.status===401){logout();throw new Error("unauth");}
  if(!r.ok)throw new Error(await r.text());
  const ct=r.headers.get("content-type")||"";return ct.includes("json")?r.json():r.text();
}
async function post(path){await api(path,{method:"POST"});}

async function doLogin(){
  const u=document.getElementById('u').value,p=document.getElementById('p').value,el=document.getElementById('loginErr');el.textContent="";
  try{
    const r=await fetch(API+"/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:u,password:p})});
    if(!r.ok){el.textContent=(await r.json()).detail||"Xatolik";return;}
    token=(await r.json()).token;
    document.getElementById('login').style.display="none";document.getElementById('app').style.display="grid";render();
  }catch(e){el.textContent="Ulanish xatosi";}
}
function logout(){token="";if(timer)clearInterval(timer);document.getElementById('app').style.display="none";document.getElementById('login').style.display="flex";}

document.getElementById('nav').addEventListener('click',e=>{const a=e.target.closest('a');if(!a)return;
  document.querySelectorAll('#nav a').forEach(x=>x.classList.remove('on'));a.classList.add('on');view=a.dataset.v;render();});
document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('auto').addEventListener('change',e=>{if(timer)clearInterval(timer);if(e.target.checked)timer=setInterval(render,10000);});

const TITLES={dashboard:"Boshqaruv",orders:"Buyurtmalar",applications:"Haydovchi arizalari",drivers:"Haydovchilar",customers:"Mijozlar"};
const OSTATES=[["","Barchasi"],["pending","Kutilmoqda"],["accepted","Qabul qilingan"],["enroute","Yo'lda"],["arrived","Yetib keldi"],["completed","Yakunlangan"],["cancelled","Bekor"]];
const DSTATES=[["","Barchasi"],["pending","Arizalar"],["approved","Tasdiqlangan"],["blocked","Bloklangan"],["rejected","Rad etilgan"]];
const DOCS=[["license_front","Guvohnoma — old"],["license_back","Guvohnoma — orqa"],["techpass_front","Texpassport — old"],["techpass_back","Texpassport — orqa"],["taxi_license","Litsenziya"],["car_photo_front","Mashina — old"],["car_photo_back","Mashina — orqa"],["car_photo_left","Chap"],["car_photo_right","O'ng"],["car_photo_interior","Salon"]];

async function render(){
  document.getElementById('title').textContent=TITLES[view];
  const c=document.getElementById('content');
  try{
    if(view==="dashboard")return dashboard(c);
    if(view==="orders")return orders(c);
    if(view==="applications")return applications(c);
    if(view==="drivers")return drivers(c);
    if(view==="customers")return customers(c);
  }catch(e){c.innerHTML="<div class='empty'>Xatolik: "+h(e.message)+"</div>";}
}

async function dashboard(c){
  const s=await api("/api/stats");
  const cards=[["Jami buyurtma",s.orders_total,""],["Faol",s.orders_active,"b"],["Yakunlangan",s.orders_completed,"g"],
    ["Bekor",s.orders_cancelled,"r"],["Daromad (so'm)",som(s.revenue_som),"y"],["Mijozlar",s.customers,""],
    ["Onlayn haydovchi",s.drivers_online,"g"],["Tasdiqlangan haydovchi",s.drivers_approved,""],
    ["Yangi arizalar",s.drivers_pending,"y"],["Chat xabarlari",s.messages,""]];
  c.innerHTML=`<div class="stats">${cards.map(([l,n,k])=>`<div class="stat ${k}"><div class="n">${n}</div><div class="l">${l}</div></div>`).join("")}</div>
    <h3 class="sec">So'nggi buyurtmalar</h3><div id="recent">Yuklanmoqda…</div>`;
  const rows=await api("/api/orders?limit=8");
  document.getElementById('recent').innerHTML=ordersTable(rows,false);
}

function ordersTable(rows,withActions){
  if(!rows.length)return "<div class='empty'>Buyurtmalar yo'q</div>";
  rows.forEach(o=>_cache['o'+o.code]=o);
  return `<table><thead><tr><th>Kod</th><th>Mijoz</th><th>Haydovchi</th><th>Yo'nalish</th><th>Narx</th><th>Holat</th><th>Vaqt</th><th></th></tr></thead>
    <tbody>${rows.map(o=>{const active=['pending','accepted','enroute','arrived'].includes(o.status);return `<tr>
      <td><b>${h(o.code)}</b></td><td>${h(o.customer_name)||'—'}</td><td>${h(o.driver_name)||'—'}</td>
      <td class="route">${h(o.pickup_address)||'—'} → ${h(o.dest_address)||'—'}</td>
      <td>${som(o.fare_som)}</td><td>${pill(o.status)}</td><td class="muted">${dt(o.created_at)}</td>
      <td class="actions"><span class="link" onclick="openChat('${h(o.code)}')">chat</span>
      ${active?`<button class="btn r" onclick="cancelOrder('${h(o.code)}')">Bekor</button>`:''}</td></tr>`;}).join("")}</tbody></table>`;
}

async function orders(c){
  c.innerHTML=`<div class="chips" id="ochips">${OSTATES.map(([v,l])=>`<span class="chip ${v===orderFilter?'on':''}" data-v="${v}">${l}</span>`).join("")}</div><div id="otable">Yuklanmoqda…</div>`;
  document.getElementById('ochips').onclick=e=>{const ch=e.target.closest('.chip');if(!ch)return;orderFilter=ch.dataset.v;orders(c);};
  const rows=await api("/api/orders?limit=300"+(orderFilter?`&status=${orderFilter}`:""));
  document.getElementById('otable').innerHTML=ordersTable(rows,true);
}
async function cancelOrder(code){if(!confirm(code+" buyurtmani bekor qilasizmi?"))return;await post(`/api/orders/${code}/cancel`);render();}

async function applications(c){
  const rows=await api("/api/applications");
  if(!rows.length){c.innerHTML="<div class='empty'>Yangi arizalar yo'q</div>";return;}
  rows.forEach(d=>_cache['d'+d.id]=d);
  c.innerHTML=`<table><thead><tr><th>F.I.O</th><th>Telefon</th><th>Mashina</th><th>Raqam</th><th>Hujjatlar</th><th>Amal</th></tr></thead>
    <tbody>${rows.map(d=>`<tr><td><b>${h(d.full_name)||'—'}</b><div class="muted">${h(d.username)||''}</div></td>
      <td>${h(d.phone)||'—'}</td><td>${h(d.car_make)||'—'} ${h(d.car_color)||''}</td><td>${h(d.car_plate)||'—'}</td>
      <td><span class="link" onclick="openDocs(${d.id})">📎 Ko'rish</span></td>
      <td class="actions"><button class="btn g" onclick="approve(${d.id})">✅ Tasdiqlash</button><button class="btn r" onclick="reject(${d.id})">❌ Rad</button></td></tr>`).join("")}</tbody></table>`;
}
async function approve(id){await post(`/api/drivers/${id}/approve`);render();}
async function reject(id){const r=prompt("Rad etish sababi:")||"";await api(`/api/drivers/${id}/reject`,{method:"POST",body:JSON.stringify({reason:r})});render();}
async function block(id){if(!confirm("Haydovchini bloklaysizmi?"))return;await post(`/api/drivers/${id}/block`);render();}
async function unblock(id){await post(`/api/drivers/${id}/unblock`);render();}
async function goOffline(id){await post(`/api/drivers/${id}/offline`);render();}

async function drivers(c){
  c.innerHTML=`<div class="chips" id="dchips">${DSTATES.map(([v,l])=>`<span class="chip ${v===driverFilter?'on':''}" data-v="${v}">${l}</span>`).join("")}</div><div id="dtable">Yuklanmoqda…</div>`;
  document.getElementById('dchips').onclick=e=>{const ch=e.target.closest('.chip');if(!ch)return;driverFilter=ch.dataset.v;drivers(c);};
  const rows=await api("/api/drivers"+(driverFilter?`?status=${driverFilter}`:""));
  if(!rows.length){document.getElementById('dtable').innerHTML="<div class='empty'>Haydovchilar yo'q</div>";return;}
  rows.forEach(d=>_cache['d'+d.id]=d);
  document.getElementById('dtable').innerHTML=`<table><thead><tr><th>F.I.O</th><th>Telefon</th><th>Mashina</th><th>Reyting</th><th>Safar</th><th>Onlayn</th><th>Holat</th><th>Amal</th></tr></thead>
    <tbody>${rows.map(d=>`<tr><td><b>${h(d.full_name)||'—'}</b></td><td>${h(d.phone)||'—'}</td>
      <td>${h(d.car_make)||'—'} ${h(d.car_plate)||''}</td><td>${d.rating_avg||0}⭐</td><td>${d.rides_done||0}</td>
      <td><span class="dot ${d.is_online?'on':'off'}"></span>${d.is_online?'onlayn':'oflayn'}</td><td>${pill(d.status)}</td>
      <td class="actions"><span class="link" onclick="openDocs(${d.id})">📎</span>
      ${d.status==='approved'?`<button class="btn r" onclick="block(${d.id})">Bloklash</button>`:''}
      ${d.status==='blocked'?`<button class="btn g" onclick="unblock(${d.id})">Faollashtirish</button>`:''}
      ${d.is_online?`<button class="btn k" onclick="goOffline(${d.id})">Oflayn</button>`:''}</td></tr>`).join("")}</tbody></table>`;
}

async function customers(c){
  const rows=await api("/api/customers");
  if(!rows.length){c.innerHTML="<div class='empty'>Mijozlar yo'q</div>";return;}
  c.innerHTML=`<table><thead><tr><th>Ism</th><th>Username</th><th>Ro'yxatdan o'tgan</th></tr></thead>
    <tbody>${rows.map(u=>`<tr><td><b>${h(u.name)||'—'}</b></td><td>${h(u.username)||'—'}</td><td class="muted">${dt(u.created_at)}</td></tr>`).join("")}</tbody></table>`;
}

async function openChat(code){
  document.getElementById('chatCode').textContent=code;openM('chatModal');
  const box=document.getElementById('chatBody');box.innerHTML="Yuklanmoqda…";
  const msgs=await api(`/api/orders/${code}/messages`);
  box.innerHTML=msgs.length?msgs.map(m=>`<div class="m ${h(m.sender_role)}"><div class="who">${m.sender_role==='driver'?'Haydovchi':'Mijoz'} · ${dt(m.created_at)}</div>
    <div class="b">${m.type==='image'?`<img src="${h(m.image_url)}">`:h(m.body)}</div></div>`).join(""):"<div class='empty'>Chat yo'q</div>";
  box.scrollTop=box.scrollHeight;
}
function openDocs(id){
  const d=_cache['d'+id];if(!d)return;
  document.getElementById('docsTitle').textContent=d.full_name||('#'+id);
  const items=DOCS.filter(([k])=>d[k]).map(([k,label])=>`<div style="margin-bottom:14px"><div class="muted" style="margin-bottom:4px;font-size:.78rem">${label}</div>
    <a href="/api/tg-photo/${h(d[k])}" target="_blank"><img src="/api/tg-photo/${h(d[k])}" loading="lazy" style="max-width:100%;border-radius:10px;border:1px solid var(--line)"></a></div>`).join("");
  document.getElementById('docsBody').innerHTML=`<div style="margin-bottom:12px;font-size:.86rem"><b>${h(d.full_name)||''}</b> · ${h(d.phone)||''} · ${h(d.car_make)||''} ${h(d.car_color)||''} · ${h(d.car_plate)||''} · ${pill(d.status)}</div>`
    +(items||"<div class='empty'>Hujjat yo'q</div>")
    +`<div class="actions" style="margin-top:8px">
      ${d.status==='pending'?`<button class="btn g" onclick="approve(${id});closeM('docsModal');">✅ Tasdiqlash</button><button class="btn r" onclick="reject(${id});closeM('docsModal');">❌ Rad</button>`:''}
      ${d.status==='approved'?`<button class="btn r" onclick="block(${id});closeM('docsModal');">Bloklash</button>`:''}
      ${d.status==='blocked'?`<button class="btn g" onclick="unblock(${id});closeM('docsModal');">Faollashtirish</button>`:''}</div>`;
  openM('docsModal');
}
</script>
</body>
</html>
